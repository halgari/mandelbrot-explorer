name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build exe
        run: uv run pyinstaller mandelbrot.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MandelbrotExplorer-windows
          path: dist/MandelbrotExplorer.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MandelbrotExplorer.exe
